name: Daily DeFi Data Collection

on:
  schedule:
    # Ogni giorno alle 9:00 UTC (11:00 ora italiana)
    - cron: '0 9 * * *'
  # Permette di eseguirlo manualmente da GitHub
  workflow_dispatch:

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run multi-protocol pipeline
        run: python pipeline/multi_protocol.py

      - name: Run anomaly detection
        run: pip install scikit-learn && python models/anomaly_detector.py
        # scikit-learn non serve alla pipeline, solo al modello
        # installiamo separatamente per velocità

      - name: Commit and push new data
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "data: daily update $(date -u '+%Y-%m-%d')"
          git push
